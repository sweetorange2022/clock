<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>甜橙的时钟 & 倒计时</title>
<style>
/* 基础样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    position: relative;
}

/* 按钮样式 - 统一和谐配色 & 统一尺寸 */
.btn {
    position: fixed;
    padding: 12px 20px;
    background-color: #2c3e50; /* 深蓝灰色，更和谐 */
    color: #ecf0f1; /* 浅灰白色 */
    font-size: 16px;
    cursor: pointer;
    z-index: 9999;
    font-family: arial black, sans-serif;
    border-radius: 8px;
    border: none;
    transition: background-color 0.2s ease;
    right: 20px; /* 所有按钮统一右对齐 */
    width: 120px; /* 统一按钮宽度 */
    text-align: center; /* 文字居中 */
}

.btn:hover {
    background-color: #34495e; /* 悬停浅一点 */
}

.btn:active {
    background-color: #1a252f; /* 点击更深 */
}

/* 按钮位置调整 - 右侧垂直排列 */
#fullscreen-btn {
    top: 20px; /* 第一个按钮：顶部 */
}

#countdown-btn {
    top: 70px;
}

#stopwatch-btn {
    top: 120px;
}

#reset-countdown-btn {
    top: 220px;
    display: none;
}

#back-btn {
    top: 170px;
    display: none;
}

#sw-start-pause-btn {
    top: 220px;
    display: none;
}

#sw-reset-btn {
    top: 270px;
    display: none;
}

/* 时间设置弹窗 - 优化样式 */
#modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #2c3e50;
    padding: 30px;
    border-radius: 10px;
    z-index: 10000;
    display: none;
    color: #ecf0f1;
    max-width: 400px;
    width: 90%;
}

/* 提示文字样式 */
.modal-tip {
    font-size: 14px;
    color: #f1c40f; /* 醒目黄色 */
    margin-bottom: 20px;
    line-height: 1.4;
    text-align: center;
}

/* 自定义下拉选择器容器 - 核心样式 */
.custom-select {
    position: relative;
    width: 80px;
    height: 44px; /* 和原select高度一致 */
    font-family: arial black, sans-serif;
}

/* 下拉触发按钮（替代原生select） */
.select-trigger {
    width: 100%;
    height: 100%;
    padding: 0 10px;
    background-color: #34495e;
    color: #ecf0f1;
    font-size: 18px;
    text-align: center; /* 文字绝对居中 */
    line-height: 44px;
    border-radius: 5px;
    border: 2px solid #34495e;
    cursor: pointer;
    transition: all 0.2s ease;
    /* 彻底隐藏原生滚轮相关样式 */
    overflow: hidden;
    white-space: nowrap;
}

.select-trigger:hover {
    background-color: #4a6580;
    border-color: #4a6580;
}

/* 下拉选项列表 */
.select-options {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    max-height: 200px;
    background-color: #2c3e50;
    border-radius: 5px;
    margin-top: 5px;
    overflow-y: auto;
    display: none;
    z-index: 10001; /* 高于弹窗 */
    /* 美化滚动条（仅保留极细的样式，避免突兀） */
    scrollbar-width: thin;
    scrollbar-color: #4a6580 #2c3e50;
}

/* 自定义滚动条（Chrome/Safari） */
.select-options::-webkit-scrollbar {
    width: 4px; /* 极细滚动条，几乎不可见 */
}
.select-options::-webkit-scrollbar-track {
    background: #2c3e50;
}
.select-options::-webkit-scrollbar-thumb {
    background-color: #4a6580;
    border-radius: 2px;
}

/* 下拉选项 */
.select-options div {
    padding: 10px 0;
    text-align: center;
    color: #ecf0f1;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.2s ease;
}

.select-options div:hover {
    background-color: #34495e;
}

/* 日期行 */
.date-selector-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
    font-size: 14px;
    color: #ecf0f1;
}

.date-selector-row label {
    font-family: arial black, sans-serif;
}

#date-mode-select,
#custom-date-input {
    padding: 8px 10px;
    border-radius: 5px;
    border: 2px solid #34495e;
    background-color: #34495e;
    color: #ecf0f1;
    font-family: arial black, sans-serif;
    font-size: 14px;
}

#custom-date-input {
    min-height: 40px;
}

#modal-error {
    display: none;
    font-size: 13px;
    color: #e74c3c;
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.4;
}

/* 选择器容器间距微调 */
.time-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 25px;
}

.time-selector span {
    font-size: 22px;
    font-weight: bold;
    color: #f1c40f;
}

#modal button {
    padding: 10px 20px;
    margin: 0 10px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    border: none;
    font-family: arial black, sans-serif;
    transition: background-color 0.2s ease;
    width: 100px; /* 弹窗按钮统一宽度 */
}

#confirm {
    background-color: #27ae60; /* 绿色确认 */
    color: white;
}

#confirm:hover {
    background-color: #2ecc71;
}

#cancel {
    background-color: #7f8c8d; /* 灰色取消 */
    color: white;
}

#cancel:hover {
    background-color: #95a5a6;
}

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    display: none;
}

/* 时钟容器 */
#clock-wrap {
    width: 98%;
    margin: 0 auto;
    padding-top: 150px;
    text-align: center;
    color: #ecf0f1;
    font-family: arial black, sans-serif;
}

#line1 {
    font-size: 3vw;
    margin-bottom: 10px;
}

#line2 {
    font-size: 17vw;
    line-height: 1;
    margin-bottom: 15px;
}

#line3 {
    font-size: 10vw;
}

#clockcanvas {
    background-color: #000;
    margin: 0 auto;
}

/* 倒计时容器 - 动态字体大小优化 */
#countdown-wrap {
    width: 100%;
    height: 100%;
    margin: 0 auto;
    padding: 0 30px 0;
    text-align: center;
    color: #ecf0f1;
    font-family: arial black, sans-serif;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#countdown-title {
    font-size: 4vw;
    margin-bottom: 20px;
    color: #ffffff; /* 纯白色标题 */
    white-space: nowrap; /* 确保一行显示 */
    width: 100%;
    text-align: center;
}

/* 基础字体大小 - 短内容正常显示 */
#countdown-show {
    font-size: 15vw; /* 正常内容的基础大小 */
    line-height: 1.2;
    margin-bottom: 0;
    white-space: nowrap; /* 强制一行显示 */
    width: 100%;
    text-align: center;
    overflow: visible;
    text-overflow: unset;
    letter-spacing: 0;
    transition: font-size 0.2s ease; /* 平滑过渡 */
}

/* 不同屏幕的基础字体适配 */
@media (max-width: 480px) {
    #countdown-show {
        font-size: 14vw; /* 手机小屏基础大小 */
    }
    #countdown-title {
        font-size: 4.5vw;
    }
}

@media (min-width: 1200px) {
    #countdown-show {
        font-size: 14vw; /* 大屏基础大小更大 */
    }
}

/* 隐藏原有的提示文本 */
#countdown-tip {
    display: none;
}
</style>
</head>
<body>
<!-- 功能按钮 - 右侧垂直排列（统一尺寸） -->
<button id="fullscreen-btn" class="btn">全屏显示</button>
<button id="countdown-btn" class="btn">倒计时</button>
<button id="stopwatch-btn" class="btn">秒表</button>
<button id="reset-countdown-btn" class="btn">重新设置</button>
<button id="back-btn" class="btn">返回时钟</button>
<button id="sw-start-pause-btn" class="btn">开始</button>
<button id="sw-reset-btn" class="btn">归零</button>

<!-- 弹窗 - 增加提示文字 -->
<div id="overlay"></div>
<div id="modal">
    <div class="modal-tip">请选择日期与终点时刻<br/>（今天仅显示当前时刻之后的选项；明天 / 后天 / 指定日期可选当天任意时刻）</div>
    <div class="date-selector-row">
        <label for="date-mode-select">日期</label>
        <select id="date-mode-select">
            <option value="today">今天</option>
            <option value="tomorrow">明天</option>
            <option value="dayafter">后天</option>
            <option value="custom">指定日期</option>
        </select>
        <input type="date" id="custom-date-input" />
    </div>
    <div id="modal-error"></div>
    <div class="time-selector">
        <!-- 小时选择器：模拟下拉容器 -->
        <div class="custom-select">
            <div class="select-trigger" id="hour-trigger">00</div>
            <div class="select-options hour-options"></div>
            <!-- 保留原select，仅隐藏 -->
            <select id="hour-select" style="display: none;"></select>
        </div>
        <span>:</span>
        <!-- 分钟选择器：模拟下拉容器 -->
        <div class="custom-select">
            <div class="select-trigger" id="minute-trigger">00</div>
            <div class="select-options minute-options"></div>
            <!-- 保留原select，仅隐藏 -->
            <select id="minute-select" style="display: none;"></select>
        </div>
    </div>
    <div style="text-align: center;">
        <button id="confirm">确认</button>
        <button id="cancel">取消</button>
    </div>
</div>

<!-- 时钟区域 -->
<div id="clock-wrap">
    <div id="line1"></div>
    <div id="line2"></div>
    <div id="line3">
        <canvas id="clockcanvas" width="360" height="360"></canvas>
    </div>
</div>

<!-- 倒计时区域 - 简化显示 -->
<div id="countdown-wrap">
    <div id="countdown-title">距离目标时间还有</div>
    <div id="countdown-show">00分 00秒</div>
    <div id="countdown-tip">目标时间：--:--</div>
</div>

<!-- JS代码放在最后 -->
<script>
// ====================== 全局状态 ======================
var WEEKDAYS = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

var countdownState = {
    isSet: false,
    targetTime: null,
    timer: null,
    lastTextType: null
};

var countdownModalContext = {
    targetCalendarDayStart: null,
    isTargetToday: false
};

var stopwatchState = {
    running: false,
    baseMs: 0,
    tickAt: null,
    timer: null,
    lastTextType: null
};

var customSelectControlsReady = false;

function pad2(n) {
    return n < 10 ? '0' + n : String(n);
}

function toYMD(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

function startOfLocalDay(d) {
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function sameLocalDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
}

function addLocalDays(d, n) {
    var base = startOfLocalDay(d);
    return new Date(base.getFullYear(), base.getMonth(), base.getDate() + n);
}

function fmt(num, type) {
    type = type || 'normal';
    if (type === 'hour') {
        return num.toString();
    }
    return num < 10 ? '0' + num : num;
}

function showModalError(msg) {
    var el = document.getElementById('modal-error');
    el.innerText = msg;
    el.style.display = 'block';
}

function clearModalError() {
    var el = document.getElementById('modal-error');
    el.innerText = '';
    el.style.display = 'none';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
    clearModalError();
}

function updateCustomDateVisibility() {
    var custom = document.getElementById('date-mode-select').value === 'custom';
    var input = document.getElementById('custom-date-input');
    input.style.display = custom ? 'inline-block' : 'none';
}

function getTextType(text) {
    if (text.indexOf('天') !== -1) {
        return 'day';
    }
    var textLength = text.length;
    if (textLength <= 7) {
        return 'short';
    }
    if (textLength <= 8) {
        return 'medium';
    }
    return 'long';
}

function adjustCountdownFontSize(text, typeHolder) {
    typeHolder = typeHolder || countdownState;
    var showElement = document.getElementById('countdown-show');
    var screenWidth = window.innerWidth;
    var textType = getTextType(text);
    if (textType === typeHolder.lastTextType) {
        return;
    }
    typeHolder.lastTextType = textType;
    var baseFontSize;
    if (screenWidth <= 480) {
        baseFontSize = 13;
    } else if (screenWidth >= 1200) {
        baseFontSize = 17;
    } else {
        baseFontSize = 15;
    }
    var fontSizeScale = 1;
    switch (textType) {
        case 'day':
            fontSizeScale = screenWidth <= 480 ? 0.55 : 0.65;
            break;
        case 'medium':
            fontSizeScale = screenWidth <= 480 ? 0.85 : 0.9;
            break;
        case 'long':
            fontSizeScale = screenWidth <= 480 ? 0.7 : 0.8;
            break;
        case 'short':
        default:
            fontSizeScale = 1;
            break;
    }
    showElement.style.fontSize = (baseFontSize * fontSizeScale) + 'vw';
}

function formatTargetTitleDate(dt) {
    var wd = WEEKDAYS[dt.getDay()];
    var y = dt.getFullYear();
    var mo = fmt(dt.getMonth() + 1);
    var da = fmt(dt.getDate());
    var hh = fmt(dt.getHours());
    var mm = fmt(dt.getMinutes());
    return y + '年' + mo + '月' + da + '日 ' + wd + ' ' + hh + ':' + mm;
}

function formatDurationParts(diffMs) {
    var totalSec = Math.max(0, Math.floor(diffMs / 1000));
    var d = Math.floor(totalSec / 86400);
    var rem = totalSec % 86400;
    var h = Math.floor(rem / 3600);
    var m = Math.floor((rem % 3600) / 60);
    var s = rem % 60;
    return {d: d, h: h, m: m, s: s};
}

function formatCountdownDisplay(diffMs) {
    var p = formatDurationParts(diffMs);
    if (p.d > 0) {
        return p.d + '天' + fmt(p.h, 'hour') + '时' + fmt(p.m) + '分' + fmt(p.s) + '秒';
    }
    if (p.h > 0) {
        return fmt(p.h, 'hour') + '时' + fmt(p.m) + '分' + fmt(p.s) + '秒';
    }
    return fmt(p.m) + '分 ' + fmt(p.s) + '秒';
}

function formatElapsed(ms) {
    return formatCountdownDisplay(ms);
}

// ====================== 时钟 ======================
function updateDigitalClock() {
    var now = new Date();
    var year = now.getFullYear();
    var month = fmt(now.getMonth() + 1);
    var day = fmt(now.getDate());
    var hh = fmt(now.getHours());
    var mm = fmt(now.getMinutes());
    var ss = fmt(now.getSeconds());
    document.getElementById('line1').innerText =
        year + ' 年 ' + month + ' 月 ' + day + ' 日 ' + WEEKDAYS[now.getDay()];
    document.getElementById('line2').innerText = hh + ':' + mm + ':' + ss;
}

function drawAnalogClock() {
    var canvas = document.getElementById('clockcanvas');
    var ctx = canvas.getContext('2d');
    var radius = canvas.height / 2;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(radius, radius);
    radius = radius * 0.8;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, 2 * Math.PI);
    ctx.fillStyle = 'white';
    ctx.fill();
    var i;
    for (i = 0; i < 12; i++) {
        ctx.save();
        ctx.rotate(i * 30 * Math.PI / 180);
        ctx.beginPath();
        ctx.moveTo(0, -radius);
        ctx.lineTo(0, -radius + 15);
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#2c3e50';
        ctx.stroke();
        ctx.restore();
    }
    for (i = 0; i < 60; i++) {
        ctx.save();
        ctx.rotate(i * 6 * Math.PI / 180);
        ctx.beginPath();
        ctx.moveTo(0, -radius);
        ctx.lineTo(0, -radius + 8);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#2c3e50';
        ctx.stroke();
        ctx.restore();
    }
    ctx.font = radius * 0.25 + 'px arial black';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    for (i = 1; i <= 12; i++) {
        var ang = i * 30 * Math.PI / 180;
        var x = Math.sin(ang) * radius * 0.8;
        var y = -Math.cos(ang) * radius * 0.8;
        ctx.fillText(i.toString(), x, y);
    }
    var now = new Date();
    var h = now.getHours() % 12;
    var m = now.getMinutes();
    var s = now.getSeconds();
    ctx.save();
    var hAng = (h * 30 + m * 0.5) * Math.PI / 180;
    ctx.rotate(hAng);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -radius * 0.5);
    ctx.lineWidth = 7;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
    ctx.save();
    var mAng = (m * 6 + s * 0.1) * Math.PI / 180;
    ctx.rotate(mAng);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -radius * 0.8);
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#2c3e50';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
    ctx.save();
    var sAng = s * 6 * Math.PI / 180;
    ctx.rotate(sAng);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -radius * 0.9);
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#2c3e50';
    ctx.fill();
    ctx.restore();
}

function clockTick() {
    updateDigitalClock();
    drawAnalogClock();
}

// ====================== 全屏 ======================
function toggleFullscreen() {
    var doc = document.documentElement;
    if (!document.fullscreenElement) {
        doc.requestFullscreen ? doc.requestFullscreen() :
        doc.webkitRequestFullscreen ? doc.webkitRequestFullscreen() :
        doc.msRequestFullscreen && doc.msRequestFullscreen();
        document.getElementById('fullscreen-btn').innerText = '退出全屏';
    } else {
        document.exitFullscreen ? document.exitFullscreen() :
        document.webkitExitFullscreen ? document.webkitExitFullscreen() :
        document.msExitFullscreen && document.msExitFullscreen();
        document.getElementById('fullscreen-btn').innerText = '全屏显示';
    }
}

// ====================== 倒计时弹窗 ======================
function resolveModalTargetDayStart() {
    var now = new Date();
    var mode = document.getElementById('date-mode-select').value;
    if (mode === 'today') {
        return startOfLocalDay(now);
    }
    if (mode === 'tomorrow') {
        return addLocalDays(now, 1);
    }
    if (mode === 'dayafter') {
        return addLocalDays(now, 2);
    }
    var v = document.getElementById('custom-date-input').value;
    if (!v) {
        return null;
    }
    var parts = v.split('-');
    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
}

function rebuildMinuteOptions() {
    var now = new Date();
    var minuteSelect = document.getElementById('minute-select');
    var hourSelect = document.getElementById('hour-select');
    minuteSelect.innerHTML = '';
    var selectedHour = parseInt(hourSelect.value, 10);
    if (isNaN(selectedHour)) {
        document.getElementById('confirm').disabled = true;
        return;
    }
    var minStart;
    if (countdownModalContext.isTargetToday && selectedHour === now.getHours()) {
        minStart = now.getMinutes() + 1;
    } else {
        minStart = 0;
    }
    var m;
    for (m = minStart; m < 60; m++) {
        var option = document.createElement('option');
        option.value = m;
        option.text = fmt(m);
        minuteSelect.appendChild(option);
    }
    if (minuteSelect.options.length === 0) {
        document.getElementById('confirm').disabled = true;
        showModalError('当前时段没有可选的分钟，请更换日期或小时。');
    } else {
        document.getElementById('confirm').disabled = false;
        clearModalError();
        minuteSelect.selectedIndex = 0;
    }
}

function rebuildHourOptions() {
    var now = new Date();
    var hourSelect = document.getElementById('hour-select');
    var minuteSelect = document.getElementById('minute-select');
    hourSelect.innerHTML = '';
    var hStart = countdownModalContext.isTargetToday ? now.getHours() : 0;
    var h;
    for (h = hStart; h < 24; h++) {
        var option = document.createElement('option');
        option.value = h;
        option.text = fmt(h);
        hourSelect.appendChild(option);
    }
    if (hourSelect.options.length === 0) {
        minuteSelect.innerHTML = '';
        document.getElementById('confirm').disabled = true;
        showModalError('没有可选的小时，请选择更晚的日期。');
        return false;
    }
    hourSelect.selectedIndex = 0;
    return true;
}

function initTimeSelector() {
    clearModalError();
    document.getElementById('confirm').disabled = false;
    var dayStart = resolveModalTargetDayStart();
    if (!dayStart) {
        countdownModalContext.targetCalendarDayStart = null;
        document.getElementById('confirm').disabled = true;
        showModalError('请选择具体日期。');
        return;
    }
    var now = new Date();
    countdownModalContext.targetCalendarDayStart = dayStart;
    countdownModalContext.isTargetToday = sameLocalDay(dayStart, now);
    if (!rebuildHourOptions()) {
        return;
    }
    rebuildMinuteOptions();
    syncCustomSelectTriggers();
    closeCustomDropdowns();
}

function closeCustomDropdowns() {
    var ho = document.querySelector('.hour-options');
    var mo = document.querySelector('.minute-options');
    if (ho) ho.style.display = 'none';
    if (mo) mo.style.display = 'none';
}

function onDocumentCloseDropdowns() {
    closeCustomDropdowns();
}

function syncCustomSelectTriggers() {
    var hourSelect = document.getElementById('hour-select');
    var minuteSelect = document.getElementById('minute-select');
    var hourTrigger = document.getElementById('hour-trigger');
    var minuteTrigger = document.getElementById('minute-trigger');
    var hourVal = hourSelect.value !== '' ? parseInt(hourSelect.value, 10) : 0;
    var minVal = minuteSelect.value !== '' ? parseInt(minuteSelect.value, 10) : 0;
    if (isNaN(hourVal)) hourVal = 0;
    if (isNaN(minVal)) minVal = 0;
    hourTrigger.innerText = fmt(hourVal);
    minuteTrigger.innerText = fmt(minVal);
}

function renderCustomOptions(select, optionsContainer) {
    optionsContainer.innerHTML = '';
    var i;
    for (i = 0; i < select.options.length; i++) {
        var option = document.createElement('div');
        option.innerText = select.options[i].text;
        option.dataset.value = select.options[i].value;
        option.onclick = function(ev) {
            ev.stopPropagation();
            select.value = this.dataset.value;
            if (select.id === 'hour-select') {
                select.dispatchEvent(new Event('change'));
            } else {
                syncCustomSelectTriggers();
                optionsContainer.style.display = 'none';
            }
        };
        optionsContainer.appendChild(option);
    }
}

function handleHourSelectChange() {
    rebuildMinuteOptions();
    syncCustomSelectTriggers();
    var minuteOptions = document.querySelector('.minute-options');
    var minuteSelect = document.getElementById('minute-select');
    renderCustomOptions(minuteSelect, minuteOptions);
}

function initCustomSelectControlsOnce() {
    if (customSelectControlsReady) {
        return;
    }
    customSelectControlsReady = true;
    var hourSelect = document.getElementById('hour-select');
    var minuteSelect = document.getElementById('minute-select');
    var hourTrigger = document.getElementById('hour-trigger');
    var minuteTrigger = document.getElementById('minute-trigger');
    var hourOptions = document.querySelector('.hour-options');
    var minuteOptions = document.querySelector('.minute-options');
    hourSelect.addEventListener('change', handleHourSelectChange);
    hourTrigger.onclick = function(e) {
        e.stopPropagation();
        minuteOptions.style.display = 'none';
        hourOptions.style.display = hourOptions.style.display === 'block' ? 'none' : 'block';
        renderCustomOptions(hourSelect, hourOptions);
    };
    minuteTrigger.onclick = function(e) {
        e.stopPropagation();
        hourOptions.style.display = 'none';
        minuteOptions.style.display = minuteOptions.style.display === 'block' ? 'none' : 'block';
        renderCustomOptions(minuteSelect, minuteOptions);
    };
    document.addEventListener('click', onDocumentCloseDropdowns);
}

function refreshCustomSelectUiAfterModalDataChange() {
    syncCustomSelectTriggers();
    closeCustomDropdowns();
}

function openCountdownModal() {
    if (countdownState.timer) {
        clearInterval(countdownState.timer);
        countdownState.timer = null;
    }
    countdownState.lastTextType = null;
    initTimeSelector();
    initCustomSelectControlsOnce();
    refreshCustomSelectUiAfterModalDataChange();
    document.getElementById('modal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function openCountdown() {
    pauseStopwatchOnLeave();
    countdownState.lastTextType = null;
    if (countdownState.isSet && countdownState.targetTime) {
        var now = new Date();
        if (countdownState.targetTime <= now) {
            countdownState.isSet = false;
            countdownState.targetTime = null;
        }
    }
    if (countdownState.isSet && countdownState.targetTime) {
        showCountdownPage();
        return;
    }
    openCountdownModal();
}

function setCountdown() {
    var dayStart = countdownModalContext.targetCalendarDayStart;
    if (!dayStart) {
        showModalError('日期无效，请重新选择。');
        return;
    }
    var hour = parseInt(document.getElementById('hour-select').value, 10);
    var minute = parseInt(document.getElementById('minute-select').value, 10);
    if (isNaN(hour) || isNaN(minute)) {
        showModalError('请选择有效的时间。');
        return;
    }
    var targetTime = new Date(dayStart.getFullYear(), dayStart.getMonth(), dayStart.getDate(), hour, minute, 0, 0);
    var now = new Date();
    if (targetTime <= now) {
        showModalError('目标时间须晚于当前时间，请重新选择。');
        return;
    }
    clearModalError();
    countdownState.isSet = true;
    countdownState.targetTime = targetTime;
    closeModal();
    showCountdownPage();
}

function showCountdownPage() {
    if (countdownState.timer) {
        clearInterval(countdownState.timer);
    }
    countdownState.lastTextType = null;
    document.getElementById('clock-wrap').style.display = 'none';
    document.getElementById('countdown-wrap').style.display = 'flex';
    document.getElementById('countdown-btn').style.display = 'none';
    document.getElementById('stopwatch-btn').style.display = 'none';
    document.getElementById('reset-countdown-btn').style.display = 'block';
    document.getElementById('back-btn').style.display = 'block';
    document.getElementById('sw-start-pause-btn').style.display = 'none';
    document.getElementById('sw-reset-btn').style.display = 'none';
    document.getElementById('countdown-title').innerText =
        '距离' + formatTargetTitleDate(countdownState.targetTime) + '还有';
    startCountdown();
}

function backToClock() {
    if (countdownState.timer) {
        clearInterval(countdownState.timer);
        countdownState.timer = null;
    }
    pauseStopwatchOnLeave();
    document.getElementById('countdown-wrap').style.display = 'none';
    document.getElementById('clock-wrap').style.display = 'block';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('reset-countdown-btn').style.display = 'none';
    document.getElementById('sw-start-pause-btn').style.display = 'none';
    document.getElementById('sw-reset-btn').style.display = 'none';
    document.getElementById('countdown-btn').style.display = 'block';
    document.getElementById('stopwatch-btn').style.display = 'block';
}

function startCountdown() {
    if (countdownState.timer) {
        clearInterval(countdownState.timer);
        countdownState.timer = null;
    }
    countdownState.timer = setInterval(function() {
        var now = new Date();
        var diff = countdownState.targetTime - now;
        if (diff <= 0) {
            clearInterval(countdownState.timer);
            countdownState.isSet = false;
            countdownState.timer = null;
            countdownState.lastTextType = null;
            var endText = formatCountdownDisplay(0);
            document.getElementById('countdown-show').innerText = endText;
            adjustCountdownFontSize(endText, countdownState);
            document.getElementById('countdown-title').innerText = '倒计时结束！';
            document.getElementById('reset-countdown-btn').style.display = 'block';
            return;
        }
        var displayText = formatCountdownDisplay(diff);
        document.getElementById('countdown-show').innerText = displayText;
        adjustCountdownFontSize(displayText, countdownState);
    }, 1000);
}

// ====================== 秒表 ======================
function stopwatchAccumulatedMs() {
    if (stopwatchState.running && stopwatchState.tickAt !== null) {
        return stopwatchState.baseMs + (Date.now() - stopwatchState.tickAt);
    }
    return stopwatchState.baseMs;
}

function refreshStopwatchDisplay() {
    var t = formatElapsed(stopwatchAccumulatedMs());
    document.getElementById('countdown-show').innerText = t;
    adjustCountdownFontSize(t, stopwatchState);
}

function startStopwatchTick() {
    if (stopwatchState.timer) {
        return;
    }
    stopwatchState.timer = setInterval(refreshStopwatchDisplay, 250);
}

function stopStopwatchTick() {
    if (stopwatchState.timer) {
        clearInterval(stopwatchState.timer);
        stopwatchState.timer = null;
    }
}

function syncStopwatchStartPauseLabel() {
    document.getElementById('sw-start-pause-btn').innerText =
        stopwatchState.running ? '暂停' : '开始';
}

function pauseStopwatchOnLeave() {
    stopStopwatchTick();
    if (stopwatchState.running) {
        stopwatchState.baseMs = stopwatchAccumulatedMs();
        stopwatchState.running = false;
        stopwatchState.tickAt = null;
    }
    syncStopwatchStartPauseLabel();
}

function openStopwatch() {
    if (countdownState.timer) {
        clearInterval(countdownState.timer);
        countdownState.timer = null;
    }
    showStopwatchPage();
}

function showStopwatchPage() {
    countdownState.lastTextType = null;
    document.getElementById('clock-wrap').style.display = 'none';
    document.getElementById('countdown-wrap').style.display = 'flex';
    document.getElementById('countdown-btn').style.display = 'none';
    document.getElementById('stopwatch-btn').style.display = 'none';
    document.getElementById('reset-countdown-btn').style.display = 'none';
    document.getElementById('back-btn').style.display = 'block';
    document.getElementById('sw-start-pause-btn').style.display = 'block';
    document.getElementById('sw-reset-btn').style.display = 'block';
    document.getElementById('countdown-title').innerText = '秒表';
    stopwatchState.lastTextType = null;
    var t = formatElapsed(stopwatchAccumulatedMs());
    document.getElementById('countdown-show').innerText = t;
    adjustCountdownFontSize(t, stopwatchState);
    syncStopwatchStartPauseLabel();
    if (stopwatchState.running) {
        startStopwatchTick();
    }
}

function toggleStopwatchRunning() {
    if (stopwatchState.running) {
        stopwatchState.baseMs = stopwatchAccumulatedMs();
        stopwatchState.running = false;
        stopwatchState.tickAt = null;
        stopStopwatchTick();
    } else {
        stopwatchState.running = true;
        stopwatchState.tickAt = Date.now();
        startStopwatchTick();
    }
    syncStopwatchStartPauseLabel();
    refreshStopwatchDisplay();
}

function resetStopwatch() {
    stopStopwatchTick();
    stopwatchState.running = false;
    stopwatchState.baseMs = 0;
    stopwatchState.tickAt = null;
    stopwatchState.lastTextType = null;
    syncStopwatchStartPauseLabel();
    var zero = formatCountdownDisplay(0);
    document.getElementById('countdown-show').innerText = zero;
    adjustCountdownFontSize(zero, stopwatchState);
}

window.addEventListener('resize', function() {
    var wrap = document.getElementById('countdown-wrap');
    if (wrap.style.display !== 'flex') {
        return;
    }
    var showElement = document.getElementById('countdown-show');
    var currentText = showElement.innerText;
    if (!currentText) {
        return;
    }
    var title = document.getElementById('countdown-title').innerText;
    if (title === '秒表') {
        stopwatchState.lastTextType = null;
        adjustCountdownFontSize(currentText, stopwatchState);
    } else {
        countdownState.lastTextType = null;
        adjustCountdownFontSize(currentText, countdownState);
    }
});

window.onload = function() {
    var todayStr = toYMD(new Date());
    var cdi = document.getElementById('custom-date-input');
    cdi.value = todayStr;
    cdi.min = todayStr;
    updateCustomDateVisibility();
    document.getElementById('date-mode-select').addEventListener('change', function() {
        updateCustomDateVisibility();
        if (document.getElementById('modal').style.display === 'block') {
            initTimeSelector();
            initCustomSelectControlsOnce();
            refreshCustomSelectUiAfterModalDataChange();
        }
    });
    cdi.addEventListener('change', function() {
        if (document.getElementById('modal').style.display === 'block') {
            initTimeSelector();
            initCustomSelectControlsOnce();
            refreshCustomSelectUiAfterModalDataChange();
        }
    });
    clockTick();
    setInterval(clockTick, 1000);
    var zero = formatCountdownDisplay(0);
    document.getElementById('countdown-show').innerText = zero;
    adjustCountdownFontSize(zero, countdownState);
    document.getElementById('fullscreen-btn').onclick = toggleFullscreen;
    document.getElementById('countdown-btn').onclick = openCountdown;
    document.getElementById('stopwatch-btn').onclick = openStopwatch;
    document.getElementById('reset-countdown-btn').onclick = openCountdownModal;
    document.getElementById('back-btn').onclick = backToClock;
    document.getElementById('sw-start-pause-btn').onclick = toggleStopwatchRunning;
    document.getElementById('sw-reset-btn').onclick = resetStopwatch;
    document.getElementById('confirm').onclick = setCountdown;
    document.getElementById('cancel').onclick = closeModal;
    document.getElementById('overlay').onclick = closeModal;
};
</script>
</body>
</html>
